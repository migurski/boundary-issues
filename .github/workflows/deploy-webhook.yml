name: Test and Deploy Webhook

on:
  push:
    branches:
      - main
    paths:
      - 'webhook/**'
      - 'requirements.txt'
      - 'Dockerfile'
  pull_request:
    paths:
      - 'webhook/**'
      - 'requirements.txt'
      - 'Dockerfile'

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.9'

      - name: Test code
        run: |
          pip install mypy ruff boto3
          ruff check webhook/*.py
          mypy --strict --config-file webhook/mypy.ini webhook/*.py
          python -m unittest webhook/webhook.py -v
          python -m unittest webhook/task.py -v
          python -m unittest webhook/finish.py -v

  deploy-webhook:
    needs: run-tests
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency:
      group: webhook-deploy
      cancel-in-progress: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Deploy webhook to Lambda
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: |
          webhook/deploy.sh
